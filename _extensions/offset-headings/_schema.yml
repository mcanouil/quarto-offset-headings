# _schema.yml for "offset-headings" filter extension
# Describes options and element attributes for IDE tooling and runtime validation.

# Extension-level metadata options.
# Configured in _quarto.yml, _metadata.yml, or document front matter:
#   extensions:
#     offset-headings:
#       offset-headings-by: 1
options:
  offset-headings-by:
    type: integer
    default: 0
    description: "Amount added to every heading level in the document. Positive values push headings deeper; negative values pull them up. The result is clamped to [1, 6]."

# Element attributes accepted by the filter on Header elements.
# Used in: ## Section {offset-headings-by="1" offset-headings-recursive="true"}
element-attributes:
  Header:
    offset-headings-by:
      type: integer
      description: "Amount added to this heading level. Positive values push the heading deeper; negative values pull it up. The result is clamped to [1, 6]."
    offset-headings-recursive:
      type: boolean
      default: false
      description: "When true, every following descendant heading receives the same offset until a sibling or ancestor heading stops the cascade."
