# _schema.yml for "offset-headings" filter extension
# Describes options and element attributes for IDE tooling and runtime validation.

# Extension-level metadata options.
# Configured in _quarto.yml, _metadata.yml, or document front matter:
#   extensions:
#     offset-headings:
#       enabled: true
options:
  enabled:
    type: boolean
    default: true
    description: "Enable or disable the offset-headings filter."

# Element attributes accepted by the filter on Pandoc elements.
# Group keys: CSS class name, ID prefix, element type (Div, Span, Code,
# CodeBlock, Header), or _any for all elements.
# Used in: [text]{.offset-headings attr=value} or ::: {.offset-headings attr=value}
element-attributes:
  offset-headings:
    example-attr:
      type: string
      description: "An example attribute for the offset-headings filter."
